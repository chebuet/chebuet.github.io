<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChE Lab Grading System - BUET</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--bg2:#1a1d27;--bg3:#232738;--bg4:#2d3147;
  --accent:#4f7ef8;--accent2:#7c3aed;--success:#10b981;--warning:#f59e0b;--danger:#ef4444;
  --text:#e8eaf6;--text2:#9ba3c2;--text3:#6b7499;
  --border:#2d3147;--border2:#3d4266;
  --card:#1e2235;--card2:#252a3d;
  --radius:10px;--radius2:6px;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
input,select,textarea{background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:var(--radius2);padding:8px 12px;font-size:13px;width:100%;outline:none;transition:.2s}
input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(79,126,248,.15)}
button{cursor:pointer;border:none;border-radius:var(--radius2);font-size:13px;font-weight:500;padding:8px 16px;transition:.2s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#3d6de0}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border2)}.btn-secondary:hover{background:var(--bg4)}
.btn-danger{background:var(--danger);color:#fff}
.btn-success{background:var(--success);color:#fff}
.btn-warning{background:var(--warning);color:#000}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.badge{display:inline-flex;align-items:center;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-blue{background:rgba(79,126,248,.15);color:#7aa3fb}
.badge-purple{background:rgba(124,58,237,.15);color:#a78bfa}
.badge-green{background:rgba(16,185,129,.15);color:#34d399}
.badge-amber{background:rgba(245,158,11,.15);color:#fbbf24}
.badge-red{background:rgba(239,68,68,.15);color:#f87171}
table{width:100%;border-collapse:collapse}
th{background:var(--bg3);color:var(--text2);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;padding:10px 14px;text-align:left}
td{padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px}
tr:hover td{background:rgba(255,255,255,.02)}
.sidebar{width:230px;min-height:100vh;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:16px 0;position:fixed;top:0;left:0;z-index:100;overflow-y:auto}
.main{margin-left:230px;min-height:100vh;display:flex;flex-direction:column}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.content{padding:24px;flex:1}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;margin:1px 8px;border-radius:var(--radius2);cursor:pointer;color:var(--text2);font-size:13px;transition:.15s}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:rgba(79,126,248,.15);color:var(--accent)}
.nav-section{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3);padding:12px 24px 4px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.stat-val{font-size:28px;font-weight:700;margin-top:4px}
.stat-lbl{font-size:12px;color:var(--text2);margin-top:2px}
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.form-label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.tab-bar{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:20px}
.tab{padding:8px 16px;color:var(--text2);cursor:pointer;font-size:13px;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.progress-bar{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:.3s}
.chip{display:inline-flex;align-items:center;background:var(--bg3);border:1px solid var(--border2);border-radius:20px;padding:3px 10px;font-size:12px;color:var(--text2)}
.alert{padding:10px 14px;border-radius:var(--radius2);font-size:13px;margin-bottom:12px}
.alert-error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#f87171}
.alert-success{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:#34d399}
.alert-warning{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);color:#fbbf24}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px}
.login-box{background:var(--card);border:1px solid var(--border2);border-radius:14px;padding:40px;width:100%;max-width:420px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.upload-zone{border:2px dashed var(--border2);border-radius:var(--radius);padding:32px;text-align:center;cursor:pointer;transition:.2s}
.upload-zone:hover{border-color:var(--accent);background:rgba(79,126,248,.05)}
select option{background:var(--bg3)}
.locked-banner{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:var(--radius2);padding:10px 14px;color:#f87171;font-size:13px;display:flex;align-items:center;gap:8px;margin-bottom:16px}
.toast{position:fixed;top:20px;right:20px;z-index:9999;padding:12px 18px;border-radius:var(--radius);font-size:13px;font-weight:500;min-width:260px;box-shadow:0 4px 24px rgba(0,0,0,.5);animation:slideIn .3s ease}
.toast-success{background:#10b981;color:#fff}
.toast-error{background:#ef4444;color:#fff}
.toast-warning{background:#f59e0b;color:#000}
@keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

const LABS=[
  {id:1,name:"Chemical Reaction Engineering Lab",code:"ChE 314",type:"experimental",coordinator:"Dr. Rahman"},
  {id:2,name:"Transport Phenomena Lab",code:"ChE 322",type:"experimental",coordinator:"Dr. Islam"},
  {id:3,name:"Thermodynamics Lab",code:"ChE 212",type:"experimental",coordinator:"Dr. Ahmed"},
  {id:4,name:"Fluid Mechanics Lab",code:"ChE 216",type:"experimental",coordinator:"Dr. Hossain"},
  {id:5,name:"Heat Transfer Lab",code:"ChE 316",type:"experimental",coordinator:"Dr. Karim"},
  {id:6,name:"Mass Transfer Lab",code:"ChE 420",type:"experimental",coordinator:"Dr. Bari"},
  {id:7,name:"Process Control Lab",code:"ChE 208",type:"computational",coordinator:"Dr. Chowdhury"},
  {id:8,name:"Simulation & Optimization Lab",code:"ChE 306",type:"computational",coordinator:"Dr. Siddique"},
  {id:9,name:"Numerical Methods Lab",code:"ChE 310",type:"computational",coordinator:"Dr. Alam"},
];

const EVAL_TYPES=["Quiz","Viva","Video Demonstration","Poster Presentation","Report"];

const USERS=[
  {id:1,email:"coordinator@buet.ac.bd",password:"coord123",name:"Dr. Rahman",role:"coordinator"},
  {id:2,email:"admin@buet.ac.bd",password:"admin123",name:"Dr. Islam",role:"admin"},
  {id:3,email:"admin2@buet.ac.bd",password:"admin123",name:"Dr. Ahmed",role:"admin"},
];

const STUDENT_IDS=Array.from({length:40},(_,i)=>`1905${String(i+1).padStart(3,"0")}`);

function genMockMarks(){
  const m={};
  LABS.forEach(lab=>{
    m[lab.id]={};
    const count=lab.type==="computational"?3:5;
    EVAL_TYPES.forEach(et=>{
      for(let n=1;n<=count;n++){
        const key=`${et}|||${n}`;
        m[lab.id][key]={};
        STUDENT_IDS.slice(0,25).forEach(sid=>{
          m[lab.id][key][sid]=Math.round(45+Math.random()*55);
        });
      }
    });
  });
  return m;
}

const defaultW={};
LABS.forEach(l=>{defaultW[l.id]={Quiz:20,Viva:20,"Video Demonstration":20,"Poster Presentation":20,Report:20};});

function App(){
  const [user,setUser]=useState(null);
  const [page,setPage]=useState("dashboard");
  const [marks,setMarks]=useState(genMockMarks);
  const [weightages,setWeightages]=useState(defaultW);
  const [lockedLabs,setLockedLabs]=useState({});
  const [auditLog,setAuditLog]=useState([]);
  const [toast,setToast]=useState(null);
  const [jumpLab,setJumpLab]=useState(null);

  const showToast=(msg,type="success")=>{
    setToast({msg,type});
    setTimeout(()=>setToast(null),3200);
  };
  const addAudit=(action,detail)=>{
    setAuditLog(p=>[{id:Date.now(),user:user?.name,action,detail,time:new Date().toLocaleString()},...p.slice(0,149)]);
  };

  if(!user) return <Login onLogin={u=>{setUser(u);}}/>;

  return(
    <div style={{display:"flex"}}>
      {toast&&<div className={`toast toast-${toast.type}`}>{toast.msg}</div>}
      <Sidebar user={user} page={page} setPage={setPage} onLogout={()=>setUser(null)}/>
      <div className="main">
        <Topbar user={user} page={page}/>
        <div className="content">
          {page==="dashboard"&&<Dashboard user={user} marks={marks} weightages={weightages} lockedLabs={lockedLabs} setPage={setPage} setJumpLab={setJumpLab}/>}
          {page==="marks"&&<MarksEntry user={user} marks={marks} setMarks={setMarks} lockedLabs={lockedLabs} showToast={showToast} addAudit={addAudit}/>}
          {page==="weightages"&&<Weightages user={user} weightages={weightages} setWeightages={setWeightages} lockedLabs={lockedLabs} showToast={showToast} addAudit={addAudit}/>}
          {page==="results"&&<Results marks={marks} weightages={weightages} jumpLab={jumpLab}/>}
          {page==="lock"&&<LockSystem user={user} lockedLabs={lockedLabs} setLockedLabs={setLockedLabs} showToast={showToast} addAudit={addAudit}/>}
          {page==="audit"&&<AuditLog auditLog={auditLog}/>}
          {page==="users"&&<UsersPage user={user}/>}
        </div>
      </div>
    </div>
  );
}

function Login({onLogin}){
  const [email,setEmail]=useState("");
  const [pass,setPass]=useState("");
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);
  const handle=()=>{
    if(!email||!pass){setErr("Please fill all fields.");return;}
    setLoading(true);setErr("");
    setTimeout(()=>{
      const u=USERS.find(u=>u.email===email&&u.password===pass);
      if(u)onLogin(u);
      else{setErr("Invalid email or password.");setLoading(false);}
    },600);
  };
  return(
    <div className="login-wrap">
      <div className="login-box">
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{width:56,height:56,background:"linear-gradient(135deg,#4f7ef8,#7c3aed)",borderRadius:16,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 14px",fontSize:26}}>⚗</div>
          <div style={{fontWeight:700,fontSize:22}}>ChE Lab Grading</div>
          <div style={{fontSize:13,color:"var(--text3)",marginTop:4}}>Department of Chemical Engineering, BUET</div>
        </div>
        {err&&<div className="alert alert-error">{err}</div>}
        <div className="form-group">
          <label className="form-label">Email Address</label>
          <input value={email} onChange={e=>setEmail(e.target.value)} type="email" placeholder="you@buet.ac.bd" onKeyDown={e=>e.key==="Enter"&&handle()}/>
        </div>
        <div className="form-group">
          <label className="form-label">Password</label>
          <input value={pass} onChange={e=>setPass(e.target.value)} type="password" placeholder="••••••••" onKeyDown={e=>e.key==="Enter"&&handle()}/>
        </div>
        <button className="btn-primary" style={{width:"100%",padding:"11px"}} onClick={handle} disabled={loading}>
          {loading?"Signing in…":"Sign In"}
        </button>
        <div style={{marginTop:22,padding:16,background:"var(--bg3)",borderRadius:8,fontSize:12,color:"var(--text3)",lineHeight:1.8}}>
          <div style={{fontWeight:700,color:"var(--text2)",marginBottom:4}}>Demo Credentials</div>
          <div><b style={{color:"var(--text)"}}>Coordinator:</b> coordinator@buet.ac.bd / coord123</div>
          <div><b style={{color:"var(--text)"}}>Admin:</b> admin@buet.ac.bd / admin123</div>
        </div>
      </div>
    </div>
  );
}

const NAV=[
  {id:"dashboard",icon:"⊞",label:"Dashboard"},
  {id:"marks",icon:"✎",label:"Enter Marks"},
  {id:"results",icon:"◉",label:"Results & Grades"},
  {id:"weightages",icon:"⊟",label:"Weightages",roles:["coordinator"]},
  {id:"lock",icon:"⊘",label:"Lock System",roles:["coordinator"]},
  {id:"audit",icon:"◷",label:"Audit Log",roles:["coordinator"]},
  {id:"users",icon:"⊙",label:"User Management",roles:["coordinator"]},
];

function Sidebar({user,page,setPage,onLogout}){
  return(
    <div className="sidebar">
      <div style={{padding:"8px 16px 16px",borderBottom:"1px solid var(--border)",marginBottom:8}}>
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"4px 8px"}}>
          <div style={{width:36,height:36,background:"linear-gradient(135deg,#4f7ef8,#7c3aed)",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>⚗</div>
          <div>
            <div style={{fontWeight:700,fontSize:13,color:"var(--text)"}}>ChE Lab Grading</div>
            <div style={{fontSize:10,color:"var(--text3)"}}>BUET</div>
          </div>
        </div>
      </div>
      <div style={{flex:1}}>
        <div className="nav-section">Menu</div>
        {NAV.filter(n=>!n.roles||n.roles.includes(user.role)).map(n=>(
          <div key={n.id} className={`nav-item${page===n.id?" active":""}`} onClick={()=>setPage(n.id)}>
            <span style={{fontSize:15}}>{n.icon}</span>
            <span>{n.label}</span>
          </div>
        ))}
      </div>
      <div style={{borderTop:"1px solid var(--border)",padding:"12px 8px 8px"}}>
        <div style={{padding:"8px 16px",marginBottom:4}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:30,height:30,borderRadius:"50%",background:"var(--bg4)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:12,flexShrink:0}}>{user.name[0]}</div>
            <div style={{minWidth:0}}>
              <div style={{fontSize:12,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{user.name}</div>
              <span className={`badge ${user.role==="coordinator"?"badge-purple":"badge-blue"}`} style={{fontSize:10}}>{user.role}</span>
            </div>
          </div>
        </div>
        <div className="nav-item" style={{color:"var(--danger)"}} onClick={onLogout}>
          <span>⊗</span><span>Sign Out</span>
        </div>
      </div>
    </div>
  );
}

const PAGE_TITLES={dashboard:"Dashboard",marks:"Enter Marks",results:"Results & Grades",weightages:"Weightage Configuration",lock:"Lab Lock System",audit:"Audit Log",users:"User Management"};

function Topbar({user,page}){
  return(
    <div className="topbar">
      <div style={{fontWeight:700,fontSize:16}}>{PAGE_TITLES[page]}</div>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:12,color:"var(--text3)"}}>Dept. of Chemical Engineering, BUET</span>
        <span className={`badge ${user.role==="coordinator"?"badge-purple":"badge-blue"}`}>{user.role}</span>
      </div>
    </div>
  );
}

function calcAvg(labId,marks,weightages){
  const w=weightages[labId]||{};
  const lm=marks[labId]||{};
  let ws=0,tw=0;
  EVAL_TYPES.forEach(et=>{
    const keys=Object.keys(lm).filter(k=>k.startsWith(et+"|||"));
    if(!keys.length)return;
    let sum=0,cnt=0;
    keys.forEach(key=>{
      Object.values(lm[key]||{}).forEach(v=>{sum+=v;cnt++;});
    });
    if(!cnt)return;
    ws+=(sum/cnt)*(w[et]||0);
    tw+=(w[et]||0);
  });
  return tw>0?Math.round(ws/tw):0;
}

function Dashboard({marks,weightages,lockedLabs,setPage,setJumpLab}){
  const locked=Object.values(lockedLabs).filter(Boolean).length;
  return(
    <div>
      <div className="grid4" style={{marginBottom:24}}>
        {[
          {v:LABS.length,l:"Total Labs",c:"var(--accent)",i:"🧪"},
          {v:STUDENT_IDS.length,l:"Students",c:"var(--success)",i:"👥"},
          {v:locked,l:"Locked Labs",c:"var(--danger)",i:"🔒"},
          {v:LABS.length-locked,l:"Active Labs",c:"var(--warning)",i:"✅"},
        ].map((s,i)=>(
          <div key={i} className="stat-card">
            <div style={{fontSize:24}}>{s.i}</div>
            <div className="stat-val" style={{color:s.c}}>{s.v}</div>
            <div className="stat-lbl">{s.l}</div>
          </div>
        ))}
      </div>
      <div className="card">
        <div style={{fontWeight:700,marginBottom:16,fontSize:15}}>All Labs — Overview</div>
        <div style={{overflowX:"auto"}}>
          <table>
            <thead>
              <tr>
                <th>Lab Name</th><th>Code</th><th>Type</th><th>Coordinator</th><th>Avg Score</th><th>Status</th><th>Action</th>
              </tr>
            </thead>
            <tbody>
              {LABS.map(lab=>{
                const avg=calcAvg(lab.id,marks,weightages);
                return(
                  <tr key={lab.id}>
                    <td style={{fontWeight:500}}>{lab.name}</td>
                    <td><span className="chip">{lab.code}</span></td>
                    <td><span className={`badge ${lab.type==="computational"?"badge-purple":"badge-blue"}`}>{lab.type}</span></td>
                    <td style={{color:"var(--text2)"}}>{lab.coordinator}</td>
                    <td>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <div className="progress-bar" style={{width:64}}>
                          <div className="progress-fill" style={{width:avg+"%",background:"var(--accent)"}}></div>
                        </div>
                        <span style={{fontWeight:700,minWidth:32}}>{avg}%</span>
                      </div>
                    </td>
                    <td>{lockedLabs[lab.id]?<span className="badge badge-red">🔒 Locked</span>:<span className="badge badge-green">✓ Active</span>}</td>
                    <td>
                      <button className="btn-secondary" style={{padding:"4px 12px",fontSize:12}}
                        onClick={()=>{setJumpLab(lab.id);setPage("results");}}>
                        View Results →
                      </button>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

function MarksEntry({user,marks,setMarks,lockedLabs,showToast,addAudit}){
  const [selLab,setSelLab]=useState("");
  const [selEval,setSelEval]=useState("");
  const [selNum,setSelNum]=useState("1");
  const [tab,setTab]=useState("manual");
  const [sid,setSid]=useState("");
  const [mval,setMval]=useState("");
  const [bulkData,setBulkData]=useState([]);
  const [bulkErrors,setBulkErrors]=useState([]);
  const [preview,setPreview]=useState(false);
  const [search,setSearch]=useState("");
  const fileRef=useRef();

  const lab=LABS.find(l=>l.id===parseInt(selLab));
  const isLocked=lockedLabs[parseInt(selLab)];
  const maxNum=lab?.type==="computational"?3:5;
  const key=`${selEval}|||${selNum}`;
  const currentMarks=(selLab&&selEval)?marks[parseInt(selLab)]?.[key]||{}:{};
  const entries=Object.entries(currentMarks).filter(([id])=>id.includes(search));

  const saveManual=()=>{
    if(!selLab||!selEval){showToast("Select lab and evaluation type","error");return;}
    if(!sid){showToast("Enter Student ID","error");return;}
    if(!STUDENT_IDS.includes(sid)){showToast(`Invalid Student ID: ${sid}`,"error");return;}
    const m=parseFloat(mval);
    if(isNaN(m)||m<0||m>100){showToast("Marks must be between 0 and 100","error");return;}
    const lid=parseInt(selLab);
    setMarks(p=>({...p,[lid]:{...p[lid],[key]:{...(p[lid]?.[key]||{}),[sid]:m}}}));
    addAudit("Marks Entry",`${lab.code} | ${selEval} #${selNum} | Student ${sid} → ${m}`);
    showToast(`Saved: ${sid} = ${m}`);
    setSid("");setMval("");
  };

  const handleFile=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const wb=XLSX.read(ev.target.result,{type:"binary"});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const data=XLSX.utils.sheet_to_json(ws,{header:1});
        const rows=data.slice(1).filter(r=>r[0]!==undefined&&r[1]!==undefined);
        const parsed=[];const errors=[];
        rows.forEach((row,i)=>{
          const id=String(row[0]).trim();
          const m=parseFloat(row[1]);
          if(!STUDENT_IDS.includes(id))errors.push(`Row ${i+2}: Invalid ID "${id}"`);
          else if(isNaN(m)||m<0||m>100)errors.push(`Row ${i+2}: Invalid marks "${row[1]}"`);
          else if(parsed.find(p=>p.id===id))errors.push(`Row ${i+2}: Duplicate ID ${id}`);
          else parsed.push({id,marks:m});
        });
        setBulkData(parsed);setBulkErrors(errors);setPreview(true);
      }catch(err){showToast("Failed to parse file. Check format.","error");}
    };
    reader.readAsBinaryString(file);
  };

  const confirmBulk=()=>{
    if(!selLab||!selEval){showToast("Select lab and evaluation type first","error");return;}
    const lid=parseInt(selLab);
    const updates={};
    bulkData.forEach(({id,marks:m})=>{updates[id]=m;});
    setMarks(p=>({...p,[lid]:{...p[lid],[key]:{...(p[lid]?.[key]||{}),...updates}}}));
    addAudit("Bulk Upload",`${lab?.code} | ${selEval} #${selNum} | ${bulkData.length} records`);
    showToast(`${bulkData.length} records saved successfully!`);
    setBulkData([]);setBulkErrors([]);setPreview(false);
    if(fileRef.current)fileRef.current.value="";
  };

  return(
    <div>
      {isLocked&&<div className="locked-banner">🔒 This lab is locked. No modifications are allowed.</div>}
      <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:20}}>
        <div className="form-group" style={{marginBottom:0,flex:"1 1 240px"}}>
          <label className="form-label">Select Lab</label>
          <select value={selLab} onChange={e=>{setSelLab(e.target.value);setSelEval("");setSelNum("1");}}>
            <option value="">— Choose Lab —</option>
            {LABS.map(l=><option key={l.id} value={l.id}>{l.code} – {l.name}</option>)}
          </select>
        </div>
        <div className="form-group" style={{marginBottom:0,flex:"1 1 180px"}}>
          <label className="form-label">Evaluation Type</label>
          <select value={selEval} onChange={e=>setSelEval(e.target.value)} disabled={!selLab}>
            <option value="">— Choose —</option>
            {EVAL_TYPES.map(e=><option key={e} value={e}>{e}</option>)}
          </select>
        </div>
        <div className="form-group" style={{marginBottom:0,flex:"0 0 140px"}}>
          <label className="form-label">{lab?.type==="computational"?"Quiz No":"Experiment No"}</label>
          <select value={selNum} onChange={e=>setSelNum(e.target.value)} disabled={!selEval}>
            {Array.from({length:maxNum||5},(_,i)=>(
              <option key={i+1} value={i+1}>{lab?.type==="computational"?"Quiz":"Expt"} {i+1}</option>
            ))}
          </select>
        </div>
      </div>

      {selLab&&selEval&&(
        <div className="grid2" style={{alignItems:"start"}}>
          <div className="card">
            <div className="tab-bar">
              <div className={`tab${tab==="manual"?" active":""}`} onClick={()=>setTab("manual")}>✎ Manual Entry</div>
              <div className={`tab${tab==="bulk"?" active":""}`} onClick={()=>setTab("bulk")}>📤 Bulk Upload</div>
            </div>
            {tab==="manual"&&(
              <div>
                <div className="form-group">
                  <label className="form-label">Student ID</label>
                  <input value={sid} onChange={e=>setSid(e.target.value)} placeholder="e.g. 1905001" list="sids" disabled={isLocked}/>
                  <datalist id="sids">{STUDENT_IDS.map(id=><option key={id} value={id}/>)}</datalist>
                </div>
                <div className="form-group">
                  <label className="form-label">Marks (0 – 100)</label>
                  <input value={mval} onChange={e=>setMval(e.target.value)} type="number" min="0" max="100" placeholder="Enter marks" disabled={isLocked} onKeyDown={e=>e.key==="Enter"&&saveManual()}/>
                </div>
                <button className="btn-primary" onClick={saveManual} disabled={isLocked}>Save Marks</button>
              </div>
            )}
            {tab==="bulk"&&(
              <div>
                <div className="upload-zone" onClick={()=>!isLocked&&fileRef.current.click()}>
                  <div style={{fontSize:32,marginBottom:8}}>📤</div>
                  <div style={{fontWeight:600,marginBottom:4}}>Click to upload Excel / CSV</div>
                  <div style={{color:"var(--text3)",fontSize:12}}>Column A: Student ID &nbsp;|&nbsp; Column B: Marks (0–100)</div>
                </div>
                <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" style={{display:"none"}} onChange={handleFile}/>
                {bulkErrors.length>0&&(
                  <div className="alert alert-error" style={{marginTop:12}}>
                    <div style={{fontWeight:600,marginBottom:4}}>{bulkErrors.length} validation error(s):</div>
                    {bulkErrors.map((e,i)=><div key={i} style={{fontSize:12,marginTop:2}}>• {e}</div>)}
                  </div>
                )}
                {preview&&bulkData.length>0&&(
                  <div style={{marginTop:12}}>
                    <div className="alert alert-success">{bulkData.length} valid records ready to save</div>
                    <div style={{maxHeight:180,overflowY:"auto",marginBottom:12,border:"1px solid var(--border)",borderRadius:6}}>
                      <table>
                        <thead><tr><th>Student ID</th><th>Marks</th></tr></thead>
                        <tbody>
                          {bulkData.slice(0,8).map(r=><tr key={r.id}><td>{r.id}</td><td style={{fontWeight:600}}>{r.marks}</td></tr>)}
                          {bulkData.length>8&&<tr><td colSpan={2} style={{textAlign:"center",color:"var(--text3)"}}>…and {bulkData.length-8} more</td></tr>}
                        </tbody>
                      </table>
                    </div>
                    <div style={{display:"flex",gap:8}}>
                      <button className="btn-success" onClick={confirmBulk} disabled={isLocked}>✓ Confirm & Save All</button>
                      <button className="btn-secondary" onClick={()=>{setBulkData([]);setBulkErrors([]);setPreview(false);if(fileRef.current)fileRef.current.value="";}}>Cancel</button>
                    </div>
                  </div>
                )}
              </div>
            )}
          </div>

          <div className="card">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <span style={{fontWeight:600}}>{Object.keys(currentMarks).length} Entries</span>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search ID…" style={{width:140,padding:"5px 10px",fontSize:12}}/>
            </div>
            <div style={{maxHeight:380,overflowY:"auto"}}>
              <table>
                <thead><tr><th>Student ID</th><th>Marks</th><th>Grade</th><th></th></tr></thead>
                <tbody>
                  {entries.length===0&&<tr><td colSpan={4} style={{textAlign:"center",color:"var(--text3)",padding:20}}>No entries yet</td></tr>}
                  {entries.map(([id,m])=>{
                    const g=m>=80?"A+":m>=75?"A":m>=70?"A-":m>=65?"B+":m>=60?"B":m>=55?"B-":m>=50?"C":"F";
                    return(
                      <tr key={id}>
                        <td style={{fontWeight:500}}>{id}</td>
                        <td><span style={{fontWeight:700,color:m>=50?"var(--success)":"var(--danger)"}}>{m}</span></td>
                        <td><span className={`badge ${m>=50?"badge-green":"badge-red"}`}>{g}</span></td>
                        <td>
                          {!isLocked&&(
                            <button style={{background:"none",border:"none",color:"var(--danger)",cursor:"pointer",fontSize:16}} onClick={()=>{
                              const lid=parseInt(selLab);
                              setMarks(p=>{
                                const n=JSON.parse(JSON.stringify(p));
                                if(n[lid]&&n[lid][key])delete n[lid][key][id];
                                return n;
                              });
                              addAudit("Delete Mark",`${lab.code} | ${selEval} #${selNum} | ${id}`);
                              showToast("Entry deleted","warning");
                            }}>×</button>
                          )}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function Weightages({user,weightages,setWeightages,lockedLabs,showToast,addAudit}){
  const [selLab,setSelLab]=useState("");
  const [localW,setLocalW]=useState({});
  const lab=LABS.find(l=>l.id===parseInt(selLab));
  const isLocked=lockedLabs[parseInt(selLab)];

  useEffect(()=>{
    if(selLab&&weightages[parseInt(selLab)])setLocalW({...weightages[parseInt(selLab)]});
  },[selLab]);

  if(user.role!=="coordinator") return(
    <div className="card" style={{textAlign:"center",padding:60}}>
      <div style={{fontSize:32,marginBottom:12}}>⊘</div>
      <div style={{color:"var(--text2)",fontWeight:600}}>Coordinator Access Required</div>
      <div style={{color:"var(--text3)",marginTop:6}}>Only coordinators can manage weightages.</div>
    </div>
  );

  const total=Object.values(localW).reduce((a,b)=>a+(parseFloat(b)||0),0);
  const save=()=>{
    if(Math.abs(total-100)>0.01){showToast("Total weightage must be exactly 100%","error");return;}
    setWeightages(p=>({...p,[parseInt(selLab)]:{...localW}}));
    addAudit("Weightage Updated",`${lab.code}: ${Object.entries(localW).map(([k,v])=>`${k}=${v}%`).join(", ")}`);
    showToast("Weightages saved successfully!");
  };

  return(
    <div>
      <div className="form-group" style={{maxWidth:400,marginBottom:20}}>
        <label className="form-label">Select Lab</label>
        <select value={selLab} onChange={e=>setSelLab(e.target.value)}>
          <option value="">— Choose Lab —</option>
          {LABS.map(l=><option key={l.id} value={l.id}>{l.code} – {l.name}</option>)}
        </select>
      </div>
      {selLab&&(
        <div className="card" style={{maxWidth:520}}>
          {isLocked&&<div className="locked-banner">🔒 This lab is locked. Weightages cannot be changed.</div>}
          <div style={{fontWeight:700,marginBottom:6}}>{lab?.code} — {lab?.name}</div>
          <div style={{color:"var(--text3)",fontSize:12,marginBottom:20}}>Coordinator: {lab?.coordinator}</div>
          {EVAL_TYPES.map(et=>(
            <div key={et} style={{marginBottom:18}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                <label className="form-label" style={{marginBottom:0}}>{et}</label>
                <span style={{fontWeight:700,color:(localW[et]||0)>0?"var(--accent)":"var(--text3)"}}>{localW[et]||0}%</span>
              </div>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <input type="range" min="0" max="100" step="5" value={localW[et]||0}
                  onChange={e=>setLocalW(p=>({...p,[et]:parseInt(e.target.value)}))}
                  disabled={isLocked} style={{flex:1,accentColor:"var(--accent)"}}/>
                <input type="number" min="0" max="100" value={localW[et]||0}
                  onChange={e=>setLocalW(p=>({...p,[et]:parseInt(e.target.value)||0}))}
                  disabled={isLocked} style={{width:64,textAlign:"center"}}/>
              </div>
              <div className="progress-bar" style={{marginTop:6}}>
                <div className="progress-fill" style={{width:(localW[et]||0)+"%",background:"var(--accent)"}}></div>
              </div>
            </div>
          ))}
          <div style={{borderTop:"1px solid var(--border)",paddingTop:16,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <span style={{fontWeight:700}}>Total: </span>
              <span style={{fontWeight:700,fontSize:18,color:Math.abs(total-100)<0.01?"var(--success)":"var(--danger)"}}>{total}%</span>
              {Math.abs(total-100)>0.01&&<span style={{color:"var(--danger)",fontSize:12,marginLeft:8}}>Must be 100%</span>}
            </div>
            <button className="btn-primary" onClick={save} disabled={isLocked||Math.abs(total-100)>0.01}>Save Weightages</button>
          </div>
        </div>
      )}
    </div>
  );
}

function calcStudentFinal(labId,sid,marks,weightages){
  const w=weightages[labId]||{};
  const lm=marks[labId]||{};
  const breakdown={};
  let ws=0,tw=0;
  EVAL_TYPES.forEach(et=>{
    const keys=Object.keys(lm).filter(k=>k.startsWith(et+"|||"));
    if(!keys.length){breakdown[et]=null;return;}
    const vals=keys.map(k=>lm[k]?.[sid]).filter(v=>v!==undefined&&v!==null);
    if(!vals.length){breakdown[et]=null;return;}
    const avg=vals.reduce((a,b)=>a+b,0)/vals.length;
    breakdown[et]=Math.round(avg*10)/10;
    ws+=avg*(w[et]||0);
    tw+=(w[et]||0);
  });
  const final=tw>0?Math.round(ws/tw):0;
  return{breakdown,final};
}

function Results({marks,weightages,jumpLab}){
  const [selLab,setSelLab]=useState(jumpLab?String(jumpLab):"");
  const [search,setSearch]=useState("");
  const [sort,setSort]=useState("id");
  const [filter,setFilter]=useState("all");

  useEffect(()=>{if(jumpLab)setSelLab(String(jumpLab));},[jumpLab]);

  const lid=parseInt(selLab);
  const students=selLab?STUDENT_IDS.filter(sid=>{
    const {final}=calcStudentFinal(lid,sid,marks,weightages);
    return final>0;
  }):[];

  let displayed=[...students];
  if(search)displayed=displayed.filter(id=>id.includes(search));
  if(filter==="pass")displayed=displayed.filter(id=>calcStudentFinal(lid,id,marks,weightages).final>=50);
  if(filter==="fail")displayed=displayed.filter(id=>calcStudentFinal(lid,id,marks,weightages).final<50);
  displayed.sort((a,b)=>{
    if(sort==="id")return a.localeCompare(b);
    const fa=calcStudentFinal(lid,a,marks,weightages).final;
    const fb=calcStudentFinal(lid,b,marks,weightages).final;
    return sort==="asc"?fa-fb:fb-fa;
  });

  const avg=displayed.length?Math.round(displayed.reduce((s,id)=>s+calcStudentFinal(lid,id,marks,weightages).final,0)/displayed.length):0;
  const passing=displayed.filter(id=>calcStudentFinal(lid,id,marks,weightages).final>=50).length;
  const lab=LABS.find(l=>l.id===lid);

  const exportCSV=()=>{
    const rows=[["Student ID",...EVAL_TYPES,"Final Score","Grade"]];
    displayed.forEach(sid=>{
      const {breakdown,final}=calcStudentFinal(lid,sid,marks,weightages);
      const g=final>=80?"A+":final>=75?"A":final>=70?"A-":final>=65?"B+":final>=60?"B":final>=55?"B-":final>=50?"C":"F";
      rows.push([sid,...EVAL_TYPES.map(et=>breakdown[et]??"-"),final,g]);
    });
    const csv=rows.map(r=>r.join(",")).join("\n");
    const blob=new Blob([csv],{type:"text/csv"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);
    a.download=`results_${lab?.code||"lab"}.csv`;a.click();
  };

  const exportXLSX=()=>{
    const rows=[["Student ID",...EVAL_TYPES,"Final Score","Grade"]];
    displayed.forEach(sid=>{
      const {breakdown,final}=calcStudentFinal(lid,sid,marks,weightages);
      const g=final>=80?"A+":final>=75?"A":final>=70?"A-":final>=65?"B+":final>=60?"B":final>=55?"B-":final>=50?"C":"F";
      rows.push([sid,...EVAL_TYPES.map(et=>breakdown[et]??"-"),final,g]);
    });
    const ws=XLSX.utils.aoa_to_sheet(rows);
    const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"Results");
    XLSX.writeFile(wb,`results_${lab?.code||"lab"}.xlsx`);
  };

  return(
    <div>
      <div style={{display:"flex",gap:12,flexWrap:"wrap",alignItems:"flex-end",marginBottom:20}}>
        <div className="form-group" style={{marginBottom:0,flex:"1 1 280px"}}>
          <label className="form-label">Select Lab</label>
          <select value={selLab} onChange={e=>setSelLab(e.target.value)}>
            <option value="">— Choose Lab —</option>
            {LABS.map(l=><option key={l.id} value={l.id}>{l.code} – {l.name}</option>)}
          </select>
        </div>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search Student ID…" style={{flex:"0 0 180px"}}/>
        <select value={sort} onChange={e=>setSort(e.target.value)} style={{flex:"0 0 160px"}}>
          <option value="id">Sort by ID</option>
          <option value="desc">Score: High → Low</option>
          <option value="asc">Score: Low → High</option>
        </select>
        <select value={filter} onChange={e=>setFilter(e.target.value)} style={{flex:"0 0 140px"}}>
          <option value="all">All Students</option>
          <option value="pass">Pass (≥50)</option>
          <option value="fail">Fail (&lt;50)</option>
        </select>
      </div>
      {selLab&&(
        <>
          <div className="grid4" style={{marginBottom:20}}>
            {[
              {v:displayed.length,l:"Shown Students",c:"var(--accent)"},
              {v:avg+"%",l:"Average Score",c:"var(--success)"},
              {v:passing,l:"Passing (≥50)",c:"var(--success)"},
              {v:displayed.length-passing,l:"Failing (<50)",c:"var(--danger)"},
            ].map((s,i)=>(
              <div key={i} className="stat-card">
                <div className="stat-val" style={{color:s.c}}>{s.v}</div>
                <div className="stat-lbl">{s.l}</div>
              </div>
            ))}
          </div>
          <div className="card">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <span style={{fontWeight:700}}>{lab?.code} — {displayed.length} students</span>
              <div style={{display:"flex",gap:8}}>
                <button className="btn-secondary" onClick={exportCSV}>⬇ CSV</button>
                <button className="btn-secondary" onClick={exportXLSX}>⬇ Excel</button>
              </div>
            </div>
            <div style={{overflowX:"auto"}}>
              <table>
                <thead>
                  <tr>
                    <th>#</th>
                    <th>Student ID</th>
                    {EVAL_TYPES.map(et=><th key={et}>{et}</th>)}
                    <th>Final</th>
                    <th>Grade</th>
                  </tr>
                </thead>
                <tbody>
                  {displayed.length===0&&(
                    <tr><td colSpan={8} style={{textAlign:"center",color:"var(--text3)",padding:32}}>No data found</td></tr>
                  )}
                  {displayed.map((sid,i)=>{
                    const {breakdown,final}=calcStudentFinal(lid,sid,marks,weightages);
                    const g=final>=80?"A+":final>=75?"A":final>=70?"A-":final>=65?"B+":final>=60?"B":final>=55?"B-":final>=50?"C":"F";
                    return(
                      <tr key={sid}>
                        <td style={{color:"var(--text3)"}}>{i+1}</td>
                        <td style={{fontWeight:600}}>{sid}</td>
                        {EVAL_TYPES.map(et=>(
                          <td key={et} style={{color:breakdown[et]!==null?"var(--text)":"var(--text3)"}}>
                            {breakdown[et]!==null?breakdown[et]:<span style={{fontSize:11}}>N/A</span>}
                          </td>
                        ))}
                        <td><span style={{fontWeight:700,fontSize:15,color:final>=50?"var(--success)":"var(--danger)"}}>{final}</span></td>
                        <td><span className={`badge ${final>=50?"badge-green":"badge-red"}`}>{g}</span></td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        </>
      )}
    </div>
  );
}

function LockSystem({user,lockedLabs,setLockedLabs,showToast,addAudit}){
  if(user.role!=="coordinator") return(
    <div className="card" style={{textAlign:"center",padding:60}}>
      <div style={{fontSize:32,marginBottom:12}}>⊘</div>
      <div style={{color:"var(--text2)",fontWeight:600}}>Coordinator Access Required</div>
    </div>
  );
  const toggle=lid=>{
    const next=!lockedLabs[lid];
    setLockedLabs(p=>({...p,[lid]:next}));
    const lab=LABS.find(l=>l.id===lid);
    addAudit(next?"Lab Locked":"Lab Unlocked",lab?.code||lid);
    showToast(next?`${lab?.code} locked`:`${lab?.code} unlocked`,next?"error":"success");
  };
  return(
    <div>
      <div className="alert alert-warning" style={{marginBottom:20}}>
        ⚠ Locking a lab prevents any further marks entry or weightage changes. Only coordinators can unlock.
      </div>
      <div className="card">
        <table>
          <thead><tr><th>Lab</th><th>Code</th><th>Type</th><th>Coordinator</th><th>Status</th><th>Action</th></tr></thead>
          <tbody>
            {LABS.map(lab=>(
              <tr key={lab.id}>
                <td style={{fontWeight:500}}>{lab.name}</td>
                <td><span className="chip">{lab.code}</span></td>
                <td><span className={`badge ${lab.type==="computational"?"badge-purple":"badge-blue"}`}>{lab.type}</span></td>
                <td style={{color:"var(--text2)"}}>{lab.coordinator}</td>
                <td>{lockedLabs[lab.id]?<span className="badge badge-red">🔒 Locked</span>:<span className="badge badge-green">✓ Active</span>}</td>
                <td>
                  <button className={lockedLabs[lab.id]?"btn-success":"btn-danger"} style={{padding:"5px 14px"}} onClick={()=>toggle(lab.id)}>
                    {lockedLabs[lab.id]?"🔓 Unlock":"🔒 Lock"}
                  </button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}
